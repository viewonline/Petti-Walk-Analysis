kind = "mobile"
previewPath = "/"
title = "Petti - 반려견 보행 분석"
version = "1.0.0"
id = "artifacts/petti"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22400

[services.development]
run = "pnpm --filter @workspace/petti run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/petti", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/petti", "run", "serve" ]

[services.env]
PORT = "22400"
BASE_PATH = "/"
